---
# ---------------------------------------------------------------
# 1. PersistentVolume - data（3个，对应3个Pod的volumeClaimTemplates）
#    claimRef 预绑定，防止被其他 PVC 抢占
# ---------------------------------------------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: es-data-pv-0
  labels:
    app: elasticsearch
    type: data
    pod: elasticsearch-0
spec:
  capacity:
    storage: 30Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: data-elasticsearch-0
    namespace: default
  hostPath:
    path: /run/desktop/mnt/host/e/dockerstore/elasticsearch/data-0
    type: DirectoryOrCreate
 
---
# 2. 创建 ConfigMap (Elasticsearch 配置)
apiVersion: v1
kind: ConfigMap
metadata:
  name: es-config
  namespace: default
data:
  elasticsearch.yml: |
    cluster.name: es-cluster
    network.host: 0.0.0.0

    discovery.type: single-node

    node.roles: [ master, data, ingest ]

    path.data: /usr/share/elasticsearch/data

    bootstrap.memory_lock: false
    http.port: 9200
    transport.port: 9300

    xpack.security.enabled: false
    xpack.security.transport.ssl.enabled: false
    xpack.security.http.ssl.enabled: false

    xpack.monitoring.collection.enabled: true

    http.cors.enabled: true
    http.cors.allow-origin: "*"
    http.cors.allow-headers: "X-Requested-With,Content-Type,Content-Length,Authorization"

  jvm.options: |
    -XX:+UseG1GC
    -XX:G1ReservePercent=25
    -XX:InitiatingHeapOccupancyPercent=30
    -Des.networkaddress.cache.ttl=60
    -Des.networkaddress.cache.negative.ttl=10
    -XX:+AlwaysPreTouch
    -Xss1m
    -Djava.awt.headless=true
    -Dfile.encoding=UTF-8
    -Djna.nosys=true
    -XX:-OmitStackTraceInFastThrow
    -Dio.netty.noUnsafe=true
    -Dio.netty.noKeySetOptimization=true
    -Dio.netty.recycler.maxCapacityPerThread=0
    -Dlog4j.shutdownHookEnabled=false
    -Dlog4j2.disable.jmx=true

       
---
# 5. 创建 Headless Service (用于集群发现)
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: default
  labels:
    app: elasticsearch
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: elasticsearch
  ports:
  - port: 9300
    name: transport
    protocol: TCP

---
# 6. 创建 StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: default
  labels:
    app: elasticsearch
spec:
  serviceName: elasticsearch-headless
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      securityContext:
        # 在 Pod 级别设置 fsGroup，这样所有容器都能正确访问挂载的卷
        fsGroup: 1000
      containers:
      - name: elasticsearch
        image: elasticsearch:8.13.4
        securityContext:
          # Elasticsearch容器默认以UID 1000运行
          runAsUser: 1000
          runAsGroup: 1000
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9200
          name: http
        - containerPort: 9300
          name: transport
        env:
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: node.name
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: discovery.type
          value: single-node
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
        - name: config
          mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
          subPath: elasticsearch.yml
        - name: config
          mountPath: /usr/share/elasticsearch/config/jvm.options
          subPath: jvm.options
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /_cluster/health?local=true
            port: 9200
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_cluster/health?local=true
            port: 9200
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      # logs 直接 hostPath 挂载，不走 PV/PVC
      - name: logs
        hostPath:
          path: /run/desktop/mnt/host/e/dockerstore/elasticsearch/logs
          type: DirectoryOrCreate
      - name: config
        configMap:
          name: es-config

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: manual
      resources:
        requests:
          storage: 30Gi

---
# 7. 创建 ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service
  namespace: default
  labels:
    app: elasticsearch
spec:
  selector:
    app: elasticsearch
  type: ClusterIP
  ports:
  - port: 9200
    targetPort: 9200
    protocol: TCP
    name: http

---
# 8. 创建 NodePort Service（本地测试外部访问入口）
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-nodeport
  namespace: default
  labels:
    app: elasticsearch
spec:
  selector:
    app: elasticsearch
  type: NodePort
  ports:
  - port: 9200
    targetPort: 9200
    nodePort: 30920
    protocol: TCP
    name: http
