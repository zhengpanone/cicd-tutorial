---
# ConfigMap for Prometheus configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # 监控 Prometheus 自身
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # 监控您的 HTTP 用户服务
      - job_name: 'user-client'
        static_configs:
          - targets: 
            # - 'user-service.default.svc.cluster.local:9000'  # Kubernetes Service DNS
            # - 'user-service.default:9000'                    # 简写 DNS

            # 或者使用具体的 Pod IP
            # - '10.1.103.44:9000'
            
            # - '172.17.0.1:8080'                                # Docker 网关 IP
            - '192.168.0.55:18081'

        # 设置抓取间隔
        scrape_interval: 10s
        scrape_timeout: 5s
        
        # 指标路径
        metrics_path: /metrics
        
        # 重新标记配置
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          hostPath:
            path: /opt/dockerstore/prometheus
            type: DirectoryOrCreate

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
  labels:
    app: prometheus
spec:
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30092
      protocol: TCP
      name: web
  selector:
    app: prometheus
