# ===============================
# 1. PV（持久卷）
# ===============================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rocketmq-broker-pv-0
  labels:
    app: rocketmq
    pv-index: "0"
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /opt/dockerstore/rocketmq/broker-0/store
    type: DirectoryOrCreate
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rocketmq-broker-pv-1
  labels:
    app: rocketmq
    pv-index: "1"
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /opt/dockerstore/rocketmq/broker-1/store
    type: DirectoryOrCreate
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rocketmq-nameserver-pv-0
  labels:
    app: rocketmq
    pv-index: "ns-0"
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /opt/dockerstore/rocketmq/nameserver-0/logs
    type: DirectoryOrCreate
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rocketmq-nameserver-pv-1
  labels:
    app: rocketmq
    pv-index: "ns-1"
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /opt/dockerstore/rocketmq/nameserver-1/logs
    type: DirectoryOrCreate
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain

---
# ===============================
# 2. PVC（声明卷）
# ===============================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rocketmq-broker-pvc-0
  labels:
    app: rocketmq
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 50Gi
  selector:
    matchLabels:
      app: rocketmq
      pv-index: "0"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rocketmq-broker-pvc-1
  labels:
    app: rocketmq
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 50Gi
  selector:
    matchLabels:
      app: rocketmq
      pv-index: "1"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rocketmq-nameserver-pvc-0
  labels:
    app: rocketmq
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: rocketmq
      pv-index: "ns-0"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rocketmq-nameserver-pvc-1
  labels:
    app: rocketmq
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: rocketmq
      pv-index: "ns-1"

---
# ===============================
# 3. ConfigMap（Broker 基础配置）
# ===============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: rocketmq-config
  namespace: default
  labels:
    app: rabbitmq
    type: config
data:
  broker-base.conf: |
    brokerClusterName=DefaultCluster
    brokerName=broker-a
    deleteWhen=04
    fileReservedTime=48
    storePathRootDir=/opt/rocketmq/store
    storePathCommitLog=/opt/rocketmq/store/commitlog
    storePathConsumeQueue=/opt/rocketmq/store/consumequeue
    storePathIndex=/opt/rocketmq/store/index
    brokerLogDir=/home/rocketmq/logs
    flushDiskType=ASYNC_FLUSH
    listenPort=10911
    autoCreateTopicEnable=true
    # 注意：不再配置 brokerIP1/2，由 Proxy 处理网络
    # 修复：DNS 与拆分后的 StatefulSet 名称对应
    # Pod DNS 格式：<statefulset名>-0.<headless-svc>.<namespace>.svc.cluster.local
    namesrvAddr=rocketmq-nameserver-svc:9876

---
# ===============================
# 4. NameServer Headless Service（两个 StatefulSet 共用）
# ===============================
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-nameserver
spec:
  clusterIP: None
  selector:
    app: rocketmq-nameserver
  ports:
    - port: 9876
      targetPort: 9876

---
# NameServer ClusterIP Service（供 Broker、Dashboard 访问）
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-nameserver-svc
spec:
  type: NodePort
  selector:
    app: rocketmq-nameserver
  ports:
    - port: 9876
      targetPort: 9876
      nodePort: 30976

---
# NameServer-0（绑定 nameserver-pvc-0）
# 宿主机路径：/opt/dockerstore/rocketmq/nameserver-0/logs → 容器 /home/rocketmq/logs
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-nameserver-0
spec:
  serviceName: rocketmq-nameserver
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-nameserver
      ns-index: "0"
  template:
    metadata:
      labels:
        app: rocketmq-nameserver
        ns-index: "0"
    spec:
      containers:
        - name: nameserver
          image: apache/rocketmq:5.3.0
          command: ["sh", "-c"]
          args:
            - /home/rocketmq/rocketmq-5.3.0/bin/mqnamesrv
          ports:
            - containerPort: 9876
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: logs
              mountPath: /home/rocketmq/logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: rocketmq-nameserver-pvc-0

---
# NameServer-1（绑定 nameserver-pvc-1）
# 宿主机路径：/opt/dockerstore/rocketmq/nameserver-1/logs → 容器 /home/rocketmq/logs
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-nameserver-1
spec:
  serviceName: rocketmq-nameserver
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-nameserver
      ns-index: "1"
  template:
    metadata:
      labels:
        app: rocketmq-nameserver
        ns-index: "1"
    spec:
      containers:
        - name: nameserver
          image: apache/rocketmq:5.3.0
          command: ["sh", "-c"]
          args:
            - /home/rocketmq/rocketmq-5.3.0/bin/mqnamesrv
          ports:
            - containerPort: 9876
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: logs
              mountPath: /home/rocketmq/logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: rocketmq-nameserver-pvc-1

---
# ===============================
# 5. Broker Service（Master + Slave 共用）
# ===============================
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
spec:
  type: NodePort
  selector:
    app: rocketmq-broker
  ports:
    - name: broker
      port: 10911
      targetPort: 10911
      nodePort: 30911
    - name: ha
      port: 10912
      targetPort: 10912
      nodePort: 30912
    - name: fastmsg
      port: 10909
      targetPort: 10909
      nodePort: 30909

---
# ===============================
# 6. Broker MASTER
# 宿主机目录结构：
#   store → /opt/dockerstore/rocketmq/broker-0/store（PVC）→ 容器 /opt/rocketmq/store
#   logs  → /opt/dockerstore/rocketmq/broker-0/logs（hostPath）→ 容器 /home/rocketmq/logs
# ===============================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-broker-master
spec:
  serviceName: rocketmq-broker
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
      role: master
  template:
    metadata:
      labels:
        app: rocketmq-broker
        role: master
    spec:
      initContainers:
        - name: init-config
          image: apache/rocketmq:5.3.0
          command: ["sh", "-c"]
          args:
            - |
              cp /etc/rocketmq-base/broker-base.conf /etc/rocketmq/broker.conf
              echo "brokerId=0" >> /etc/rocketmq/broker.conf
              echo "brokerRole=ASYNC_MASTER" >> /etc/rocketmq/broker.conf
              # 内网IP（K8s内部通信）
              # echo "brokerIP1=${POD_IP}" >> /etc/rocketmq/broker.conf
              # 外网IP（外部客户端访问）
              # 用 NODE_IP 作为 brokerIP2
              # echo "brokerIP2=${NODE_IP}" >> /etc/rocketmq/broker.conf

              # 【修改】不再注入 brokerIP1 和 brokerIP2
              # Broker 现在只在内网通信，由 Proxy 处理外网映射
              echo "listenPort=10911" >> /etc/rocketmq/broker.conf
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: config
              mountPath: /etc/rocketmq
            - name: config-base
              mountPath: /etc/rocketmq-base
      containers:
        - name: broker
          image: apache/rocketmq:5.3.0
          command: ["sh", "-c"]
          args:
            - /home/rocketmq/rocketmq-5.3.0/bin/mqbroker -c /etc/rocketmq/broker.conf
          env:
            - name: JAVA_OPT_EXT
              value: "-Xms512m -Xmx512m -Xmn256m"
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 10911
            - containerPort: 10912
            - containerPort: 10909
          volumeMounts:
            - name: data
              mountPath: /opt/rocketmq/store
            - name: logs
              mountPath: /home/rocketmq/logs
            - name: config
              mountPath: /etc/rocketmq
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rocketmq-broker-pvc-0
        - name: logs
          hostPath:
            path: /opt/dockerstore/rocketmq/broker-0/logs
            type: DirectoryOrCreate
        - name: config
          emptyDir: {}
        - name: config-base
          configMap:
            name: rocketmq-config

---
# ===============================
# 7. Broker SLAVE
# 宿主机目录结构：
#   store → /opt/dockerstore/rocketmq/broker-1/store（PVC）→ 容器 /opt/rocketmq/store
#   logs  → /opt/dockerstore/rocketmq/broker-1/logs（hostPath）→ 容器 /home/rocketmq/logs
# ===============================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-broker-slave
spec:
  serviceName: rocketmq-broker
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
      role: slave
  template:
    metadata:
      labels:
        app: rocketmq-broker
        role: slave
    spec:
      initContainers:
        - name: init-config
          image: apache/rocketmq:5.3.0
          command: ["sh", "-c"]
          args:
            - |
              cp /etc/rocketmq-base/broker-base.conf /etc/rocketmq/broker.conf
              echo "brokerId=1" >> /etc/rocketmq/broker.conf
              echo "brokerRole=SLAVE" >> /etc/rocketmq/broker.conf
              # 内网IP（K8s内部通信）
              # echo "brokerIP1=${POD_IP}" >> /etc/rocketmq/broker.conf
               # 外网IP（外部客户端访问）
              # 用 NODE_IP 作为 brokerIP2
              # echo "brokerIP2=${NODE_IP}" >> /etc/rocketmq/broker.conf
              # 【修改】不再注入 brokerIP1 和 brokerIP2
              # Broker 现在只在内网通信，由 Proxy 处理外网映射
              echo "listenPort=10911" >> /etc/rocketmq/broker.conf
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: config
              mountPath: /etc/rocketmq
            - name: config-base
              mountPath: /etc/rocketmq-base
      containers:
        - name: broker
          image: apache/rocketmq:5.3.0
          command: ["sh", "-c"]
          args:
            - /home/rocketmq/rocketmq-5.3.0/bin/mqbroker -c /etc/rocketmq/broker.conf
          env:
            - name: JAVA_OPT_EXT
              value: "-Xms512m -Xmx512m -Xmn256m"
          securityContext:
            runAsUser: 0
          ports:
            - containerPort: 10911
            - containerPort: 10912
            - containerPort: 10909
          volumeMounts:
            - name: data
              mountPath: /opt/rocketmq/store
            - name: logs
              mountPath: /home/rocketmq/logs
            - name: config
              mountPath: /etc/rocketmq
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rocketmq-broker-pvc-1
        - name: logs
          hostPath:
            path: /opt/dockerstore/rocketmq/broker-1/logs
            type: DirectoryOrCreate
        - name: config
          emptyDir: {}
        - name: config-base
          configMap:
            name: rocketmq-config

---
# ===============================
# 8. Dashboard
# ===============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-dashboard
  template:
    metadata:
      labels:
        app: rocketmq-dashboard
    spec:
      containers:
        - name: dashboard
          image: apacherocketmq/rocketmq-dashboard:latest
          ports:
            - containerPort: 8082
          env:
            - name: JAVA_OPTS
              value: "-Drocketmq.namesrv.addr=rocketmq-nameserver-svc:9876"

---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-dashboard
spec:
  type: NodePort
  selector:
    app: rocketmq-dashboard
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30882

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-proxy
  labels:
    app: rocketmq-proxy
spec:
  replicas: 1 # 生产环境建议 2-3 个副本
  selector:
    matchLabels:
      app: rocketmq-proxy
  template:
    metadata:
      labels:
        app: rocketmq-proxy
    spec:
      initContainers:
        # 【新增】使用 InitContainer 准备配置文件
        - name: init-config
          image: busybox:1.35
          command: ["sh", "-c"]
          args:
            - |
              # 【关键修改】使用标准 Key: nameSrvAddr，并简化写入方式
              echo '{
                "proxyMode": "CLUSTER",
                "nameSrvAddr": "rocketmq-nameserver-svc:9876",
                "proxyMetadataTopicScanEnable": true,
                "grpcServerPort": 8081,
                "remotingServerPort": 8080
              }' > /etc/rocketmq-proxy/conf/rocketmq-proxy.json

          env:
            - name: ROCKETMQ_NAMESERVER_ADDR
              value: "rocketmq-nameserver-svc:9876"
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/rocketmq-proxy/conf
      containers:
        - name: proxy
          image: apache/rocketmq:5.3.0 # 确保版本 >= 5.0
          command: ["sh", "-c"]
          args:
            - |
              sh /home/rocketmq/rocketmq-5.3.0/bin/mqproxy -pc /etc/rocketmq-proxy/conf/rocketmq-proxy.json
          env:
            # 【关键】连接内网 NameServer 的地址
            - name: ROCKETMQ_NAMESERVER_ADDR
              value: "rocketmq-nameserver-svc:9876"
            # 可选：设置 Proxy 的内存
            - name: JAVA_OPT
              value: "-Xms512m -Xmx512m"
            - name: ROCKETMQ_HOME
              value: "/home/rocketmq/rocketmq-5.3.0"
          ports:
            - containerPort: 8081 # gRPC 端口
              name: grpc
            - containerPort: 8080 # remoting 端口 (兼容旧版客户端)
              name: remoting
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/rocketmq-proxy/conf
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: proxy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-proxy-svc
spec:
  type: NodePort
  selector:
    app: rocketmq-proxy
  ports:
    # gRPC 端口映射
    - name: grpc
      port: 8081
      targetPort: 8081
      nodePort: 30881 # 外部访问端口 (确保防火墙开放)
    # Remoting 端口映射 (可选，用于兼容)
    - name: remoting
      port: 8080
      targetPort: 8080
      nodePort: 30880
