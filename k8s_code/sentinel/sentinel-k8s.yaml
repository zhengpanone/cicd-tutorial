apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
  labels:
    app: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
    spec:
      containers:
        - name: sentinel-dashboard
          image: bladex/sentinel-dashboard:1.8.9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8858
          env:
            - name: JAVA_OPTS
              value: "-Dserver.port=8858"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 8858
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 8858
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-dashboard
  labels:
    app: sentinel
spec:
  type: NodePort
  selector:
    app: sentinel
  ports:
    - name: http
      port: 8858
      targetPort: 8858
      nodePort: 30858
      protocol: TCP