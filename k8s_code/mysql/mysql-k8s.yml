# 1. 创建 PersistentVolume (PV) 持久化存储卷
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-data-pv
  labels:
    app: mysql
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /run/desktop/mnt/host/e/dockerstore/mysql/data
    type: DirectoryOrCreate
---
# 2. 创建 Persistent Volume Claim (PVC) 存储声明
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-pvc # PVC 名称
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual    
  resources:
    requests:
      storage: 10Gi
  
  selector:
    matchLabels:
      app: mysql
---
# 3. 创建 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: default
  labels:
    app: mysql
    type: config
data:
  my.cnf: |
    [client]
    default-character-set=utf8mb4

    [mysql]
    default-character-set=utf8mb4

    [mysqld]
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

    max_connections=200
    max_allowed_packet=64M

    lower_case_table_names=1

    default-storage-engine=INNODB

    skip-host-cache
    skip-name-resolve

    log_bin_trust_function_creators=ON
---
# 4. 创建 Secret
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: default
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
---
# 5. 创建 StatefulSet 部署
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: default
  labels:
    app: mysql 
spec:
  replicas: 1
  serviceName: mysql-headless
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      securityContext:
        fsGroup: 0
        runAsUser: 0
      containers:
      - name: mysql
        image: mysql:8.0.24
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef: 
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD
        - name: TZ
          value: "Asia/Shanghai"

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/conf.d/my.cnf
          subPath: my.cnf
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        startupProbe:
          exec:
            command:
              - sh
              - -c
              - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u root -p\"$MYSQL_ROOT_PASSWORD\""]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u root -p\"$MYSQL_ROOT_PASSWORD\""]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-data-pvc
      - name: mysql-config
        configMap:
          name: mysql-config
          items:
          - key: my.cnf
            path: my.cnf
---
---
# =========================
# Headless Service
# StatefulSet 必须
# =========================
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: default
spec:
  clusterIP: None

  selector:
    app: mysql

  ports:
    - port: 3306
      targetPort: 3306
---      
# 创建 NodePort Service 服务
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: default
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  type: NodePort  # ✅ 改这里
  ports:
  - port: 3306
    targetPort: 3306
    nodePort: 30306  # ✅ 固定一个端口（范围 30000-32767）
    protocol: TCP
    name: mysql


