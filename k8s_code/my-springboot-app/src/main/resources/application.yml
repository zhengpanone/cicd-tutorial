server:
  port: 8080
  shutdown: graceful

spring:
  mvc:
    async:
      request-timeout: -1
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
app:
  version: 1.0.0