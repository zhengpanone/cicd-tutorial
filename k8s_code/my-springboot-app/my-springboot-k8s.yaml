---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: spring-app
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-springboot-app-deployment
  namespace: spring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-springboot-app
  template:
    metadata:
      labels:
        app: my-springboot-app
    spec:
      containers:
        - name: my-springboot-app
          image: localhost:32000/my-springboot-app:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: my-springboot-app-service
  namespace: spring-app
spec:
  selector:
    app: my-springboot-app   
  ports:
    - port: 81
      targetPort: 8080

---
# Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-demo
  namespace: spring-app   
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 81
      protocol: HTTP

---
# HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spring-restful-service-route
  namespace: spring-app   
spec:
  parentRefs:
    - name: gateway-demo
  # hostnames:
  #   - api.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: my-springboot-app-service   
          port: 81
